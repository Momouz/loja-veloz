services:

  gateway:
    build: ./gateway
    ports:
      - "8080:8080"

  pedidos:
    build: ./pedidos
    ports:
      - "8081:8081"

  estoque:
    build: ./estoque
    ports:
      - "8082:8082"

  pagamentos:
    build: ./pagamentos
    ports:
      - "8083:8083"

  postgres:
    image: postgres:16

    environment:
      POSTGRES_DB: lojaveloz
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: